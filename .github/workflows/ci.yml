name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install staticcheck
        shell: pwsh
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          go install golang.org/x/tools/cmd/deadcode@latest
          go install mvdan.cc/unparam@latest
          go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Verify modules
        run: go mod verify

      - name: Test
        run: go test ./... -count=1

      - name: Vet
        run: go vet ./...

      - name: Govulncheck
        shell: pwsh
        run: |
          $env:PATH = "$env:USERPROFILE\go\bin;$env:PATH"
          govulncheck ./...

      - name: Staticcheck
        shell: pwsh
        run: |
          $env:PATH = "$env:USERPROFILE\go\bin;$env:PATH"
          staticcheck ./...

      - name: Deadcode
        shell: pwsh
        run: |
          $env:PATH = "$env:USERPROFILE\go\bin;$env:PATH"
          deadcode ./...

      - name: Unparam
        shell: pwsh
        run: |
          $env:PATH = "$env:USERPROFILE\go\bin;$env:PATH"
          unparam ./...

      - name: Setup MinGW for race detector
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc

      - name: Add MinGW to PATH
        shell: pwsh
        run: |
          "${{ steps.msys2.outputs.msys2-location }}\mingw64\bin" | Out-File $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Race
        shell: pwsh
        run: |
          $env:CGO_ENABLED = "1"
          go test -race ./...

      - name: Build
        shell: pwsh
        run: |
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          $env:CGO_ENABLED = "0"
          go build -trimpath ./cmd/wtm
