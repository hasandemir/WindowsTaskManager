<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="wtm-csrf-token" content="__WTM_CSRF_TOKEN__" />
    <title>Windows Task Manager</title>
    <script>
      (() => {
        const key = "wtm-theme";
        const stored = localStorage.getItem(key) || "\"system\"";
        const parsed = JSON.parse(stored);
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        const resolved = parsed === "system" ? (prefersDark ? "dark" : "light") : parsed;
        document.documentElement.dataset.theme = resolved;
        document.documentElement.dataset.themePreference = parsed;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
