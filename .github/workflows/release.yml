name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 0.1.0). Omit to dry-run."
        required: false

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like "refs/tags/v*") {
            $v = "$env:GITHUB_REF".Substring("refs/tags/v".Length)
          } elseif ("${{ github.event.inputs.version }}") {
            $v = "${{ github.event.inputs.version }}"
          } else {
            $v = "0.0.0-dev"
          }
          "version=$v" | Out-File $env:GITHUB_OUTPUT -Append
          Write-Host "resolved version: $v"

      - name: Vet
        run: go vet ./...

      - name: Build wtm.exe
        shell: pwsh
        run: |
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          $env:CGO_ENABLED = "0"
          $ldflags = "-s -w -H windowsgui -X main.version=${{ steps.ver.outputs.version }}"
          go build -trimpath -ldflags $ldflags -o wtm.exe ./cmd/wtm

      - name: Checksum
        shell: pwsh
        run: |
          $h = (Get-FileHash wtm.exe -Algorithm SHA256).Hash.ToLower()
          "$h  wtm.exe" | Out-File wtm.exe.sha256 -Encoding ascii
          Write-Host "sha256: $h"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: wtm-${{ steps.ver.outputs.version }}
          path: |
            wtm.exe
            wtm.exe.sha256

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.ver.outputs.version }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            wtm.exe
            wtm.exe.sha256
