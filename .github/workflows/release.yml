name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 0.1.0). Omit to dry-run."
        required: false

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Install analyzers
        shell: pwsh
        run: |
          go install golang.org/x/tools/cmd/deadcode@latest
          go install mvdan.cc/unparam@latest
          go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like "refs/tags/v*") {
            $v = "$env:GITHUB_REF".Substring("refs/tags/v".Length)
          } elseif ("${{ github.event.inputs.version }}") {
            $v = "${{ github.event.inputs.version }}"
          } else {
            $v = "0.0.0-dev"
          }
          "version=$v" | Out-File $env:GITHUB_OUTPUT -Append
          Write-Host "resolved version: $v"

      - name: Verify modules
        run: go mod verify

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -count=1

      - name: Govulncheck
        shell: pwsh
        run: |
          $env:PATH = "$env:USERPROFILE\go\bin;$env:PATH"
          govulncheck ./...

      - name: Deadcode
        shell: pwsh
        run: |
          $env:PATH = "$env:USERPROFILE\go\bin;$env:PATH"
          deadcode ./...

      - name: Unparam
        shell: pwsh
        run: |
          $env:PATH = "$env:USERPROFILE\go\bin;$env:PATH"
          unparam ./...

      - name: Build wtm.exe
        shell: pwsh
        run: |
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          $env:CGO_ENABLED = "0"
          $ldflags = "-s -w -H windowsgui -X main.version=${{ steps.ver.outputs.version }}"
          $exe = "wtm-${{ steps.ver.outputs.version }}-windows-amd64.exe"
          go build -trimpath -ldflags $ldflags -o $exe ./cmd/wtm

      - name: Checksum
        shell: pwsh
        run: |
          $exe = "wtm-${{ steps.ver.outputs.version }}-windows-amd64.exe"
          $sha = "$exe.sha256"
          $h = (Get-FileHash $exe -Algorithm SHA256).Hash.ToLower()
          "$h  $exe" | Out-File $sha -Encoding ascii
          Write-Host "sha256: $h"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: wtm-${{ steps.ver.outputs.version }}
          path: |
            wtm-${{ steps.ver.outputs.version }}-windows-amd64.exe
            wtm-${{ steps.ver.outputs.version }}-windows-amd64.exe.sha256

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.ver.outputs.version }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            wtm-${{ steps.ver.outputs.version }}-windows-amd64.exe
            wtm-${{ steps.ver.outputs.version }}-windows-amd64.exe.sha256
