name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Install staticcheck
        shell: pwsh
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Test
        run: go test ./... -count=1

      - name: Vet
        run: go vet ./...

      - name: Staticcheck
        shell: pwsh
        run: |
          $env:PATH = "$env:USERPROFILE\go\bin;$env:PATH"
          staticcheck ./...

      - name: Build
        shell: pwsh
        run: |
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          $env:CGO_ENABLED = "0"
          go build -trimpath ./cmd/wtm
